<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYS - Security Synchronization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --gys-green: #228b22;
            --gys-yellow: #ffd700;
            --terminal-bg: #020617;
            --terminal-panel: #0f172a;
            --terminal-line: #334155;
            --terminal-text: #e2e8f0;
            --terminal-muted: #94a3b8;
        }

        body {
            align-items: center;
            background:
                radial-gradient(circle at top, rgba(34, 139, 34, 0.18), transparent 34%),
                linear-gradient(135deg, #020617 0%, #0f172a 55%, #111827 100%);
            color: var(--terminal-text);
            display: flex;
            font-family: "Courier New", Courier, monospace;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            padding: 24px;
        }

        .sync-terminal {
            background: rgba(15, 23, 42, 0.94);
            border: 1px solid rgba(255, 215, 0, 0.55);
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45), 0 0 28px rgba(34, 139, 34, 0.16);
            max-width: 620px;
            padding: 32px;
            width: 100%;
        }

        .terminal-kicker {
            color: var(--gys-yellow);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .terminal-title {
            color: #ffffff;
            font-size: 1.35rem;
            font-weight: 800;
            margin: 8px 0 6px;
        }

        .terminal-subtitle {
            color: var(--terminal-muted);
            font-size: 0.86rem;
            margin-bottom: 24px;
        }

        .progress-shell {
            background: #020617;
            border: 1px solid var(--terminal-line);
            border-radius: 999px;
            height: 16px;
            overflow: hidden;
            padding: 3px;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--gys-green), var(--gys-yellow));
            border-radius: 999px;
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.45);
            height: 100%;
            transition: width 0.12s linear;
            width: 0%;
        }

        .progress-meta {
            align-items: center;
            color: var(--gys-yellow);
            display: flex;
            font-size: 0.82rem;
            font-weight: 800;
            justify-content: space-between;
            margin: 12px 0 18px;
            text-transform: uppercase;
        }

        .log-window {
            background: var(--terminal-bg);
            border: 1px solid var(--terminal-line);
            border-radius: 8px;
            color: #cbd5e1;
            font-size: 0.82rem;
            height: 170px;
            line-height: 1.6;
            overflow: hidden;
            padding: 16px;
        }

        .log-line {
            display: block;
            white-space: nowrap;
        }

        .status-dot {
            background: var(--gys-green);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(34, 139, 34, 0.85);
            display: inline-block;
            height: 9px;
            margin-right: 8px;
            width: 9px;
        }
    </style>
</head>
<body>
    <main class="sync-terminal text-center">
        <div class="terminal-kicker">Board Authentication Bridge</div>
        <h1 class="terminal-title">Decrypting Administrative Session</h1>
        <p class="terminal-subtitle">Synchronizing trustee credentials with the GYS registry command layer.</p>

        <div class="progress-shell">
            <div id="progressFill" class="progress-fill"></div>
        </div>

        <div class="progress-meta">
            <span><span class="status-dot"></span><span id="statusText">Initializing decryption</span></span>
            <span id="progressPercent">0%</span>
        </div>

        <div id="logWindow" class="log-window text-start">
            <span class="log-line">&gt; Opening encrypted board terminal channel...</span>
        </div>
    </main>

    <script>
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const statusText = document.getElementById('statusText');
        const logWindow = document.getElementById('logWindow');

        const checkpoints = [
            { pct: 12, status: 'Validating access token', log: '> Decrypting trustee passcode signature...' },
            { pct: 28, status: 'Reading registry index', log: '> Loading protected citizen table references...' },
            { pct: 46, status: 'Unlocking dashboard route', log: '> Decrypting administrative route permissions...' },
            { pct: 64, status: 'Verifying database session', log: '> Matching approval keys against registry state...' },
            { pct: 82, status: 'Compiling command view', log: '> Preparing Board Command Central interface...' },
            { pct: 100, status: 'Access granted', log: '> Decryption complete. Redirecting to dashboard...' }
        ];

        let progress = 0;
        let checkpointIndex = 0;

        const timer = setInterval(() => {
            progress += 2;
            progressFill.style.width = progress + '%';
            progressPercent.textContent = progress + '%';

            if (checkpointIndex < checkpoints.length && progress >= checkpoints[checkpointIndex].pct) {
                statusText.textContent = checkpoints[checkpointIndex].status;
                logWindow.innerHTML += `<span class="log-line">${checkpoints[checkpointIndex].log}</span>`;
                logWindow.scrollTop = logWindow.scrollHeight;
                checkpointIndex++;
            }

            if (progress >= 100) {
                clearInterval(timer);
                setTimeout(() => {
                    window.location.href = '/admin/dashboard';
                }, 900);
            }
        }, 80);
    </script>
</body>
</html>
