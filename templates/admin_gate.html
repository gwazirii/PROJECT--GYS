<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYS Administrative Node Access</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .terminal-card { background-color: #1f2833; border: 2px solid #45a29e; box-shadow: 0 0 15px rgba(69, 162, 158, 0.5); border-radius: 8px; width: 100%; max-width: 420px; padding: 30px; }
    .btn-auth { background-color: #45a29e; color: #0b0c10; font-weight: bold; border: none; }
    .btn-auth:hover { background-color: #66fcf1; }
    .text-neon { color: #66fcf1; }
  </style>
</head>
<body>
  <div class="terminal-card">
    <div class="text-center mb-4">
      <h4 class="text-neon fw-bold">BOARD TERMINAL GATE</h4>
      <p class="text-muted small">Restricted administrative node clearance entry point.</p>
    </div>
        
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger py-2 small border-0 bg-dark text-danger text-center">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/trustee/login" method="POST">
      <div class="mb-3">
        <label class="form-label small text-uppercase fw-bold">Trustee Username ID</label>
        <input type="text" name="trustee_username" class="form-control bg-dark text-white border-secondary" required autocomplete="off">
      </div>
      <div class="mb-3">
        <label class="form-label small text-uppercase fw-bold">Authentication Number</label>
        <input type="password" name="authentication_number" class="form-control bg-dark text-white border-secondary" required>
      </div>
      <button type="submit" class="btn btn-auth w-100 py-2 mt-2">AUTHENTICATE TERMINAL</button>
    </form>
  </div>
</body>
</html>
