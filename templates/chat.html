<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strategy Communication Room</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f4; margin: 0; padding: 20px; }
        .chat-container { max-width: 600px; margin: 30px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .window { background: #f8f9fa; border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .msg { padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; background: #e9ecef; font-size: 14px; }
        input[type="text"] { width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { width: 22%; background: #28a745; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        nav { background: #1b263b; padding: 15px; display: flex; justify-content: space-between; margin: -20px -20px 20px -20px; }
        nav a { color: #70e000; text-decoration: none; font-weight: bold; margin-left: 15px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <nav>
            <span style="color:#fff;">Strategy Terminal</span>
            <div>
                <a href="{{ url_for('home') }}">Workspace</a>
                <a href="{{ url_for('logout') }}" style="color:#ff4d4d;">Disconnect</a>
            </div>
        </nav>

        <div class="window">
            {% for msg in messages %}
                <div class="msg">{{ msg }}</div>
            {% else %}
                <div style="color:#888; text-align:center; margin-top:100px;">Communications timeline clear. Send a message below.</div>
            {% endfor %}
        </div>

        <form action="{{ url_for('chat') }}" method="POST">
            <input type="text" name="message" placeholder="Type tactical message transmissions..." required autofocus>
            <input type="submit" value="Transmit">
        </form>
    </div>

</body>
</html>
